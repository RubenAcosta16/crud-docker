name: CI/CD Pipeline Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código (Actualizado a v4)
    - name: Checkout de código
      uses: actions/checkout@v4

    # 2. Iniciar sesión en Docker Hub (Actualizado a v3)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. BUILD: Construir la imagen de Docker
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/crud-express:latest .

    # 4. PUSH: Subir la imagen al registro
    - name: Push Image to Docker Hub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/crud-express:latest

    # 5. DEPLOY: Simulación de despliegue SSH
    - name: Deploy to Server (Simulado)
      run: |
        echo "Conectando mediante SSH al servidor..."
        echo "Descargando nueva imagen: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/crud-express:latest"
        echo "Reiniciando contenedor... ¡Despliegue en la nube exitoso!"