name: CI/CD Pipeline Docker

# Punto 3: Eventos que disparan el flujo (Trigger)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout de código
      uses: actions/checkout@v3

    # 2. Iniciar sesión en Docker Hub (Mecanismo de Integración)
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. BUILD: Construir la imagen de Docker (Punto 2.c - Build)
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/crud-express:latest .

    # 4. PUSH: Subir la imagen al registro (Punto 2.c - Push)
    - name: Push Image to Docker Hub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/crud-express:latest

    # 5. DEPLOY: Simulación de despliegue SSH (Punto 2.c - Deploy)
    - name: Deploy to Server (Simulado)
      run: |
        echo "Conectando mediante SSH al servidor..."
        echo "Descargando nueva imagen: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/crud-express:latest"
        echo "Reiniciando contenedor... ¡Despliegue en la nube exitoso!"